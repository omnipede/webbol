<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webbol Java Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #1a1a2e; }
        .subtitle { color: #666; margin-bottom: 2rem; }
        .status {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .info {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #555;
            line-height: 1.8;
        }
        code {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Webbol Java</h1>
        <p class="subtitle">COBOL 에서 Java 로 포팅된 웹 서버</p>
        <div class="status">✓ 서버가 정상 작동 중입니다</div>
        <div class="info">
            이 페이지는 <code>index.html</code> 파일입니다.<br>
            다른 파일을 요청하면 해당 파일이 제공됩니다.<br>
            존재하지 않는 파일은 404 에러를 반환합니다.
        </div>
    </div>
</body>
</html>
